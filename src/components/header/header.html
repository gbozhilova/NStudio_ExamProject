<header class="site-header border-bottom">
  <div class="container py-3">
    <div class="header-bar d-flex flex-wrap justify-content-between align-items-center gap-3">
      <a class="brand d-inline-flex align-items-center gap-3 text-decoration-none" href="/home" data-nav-link>
        <img class="brand-logo" src="/assets/Logo%20Trnsparent%20.PNG" alt="NStudio Salon" />
        <span class="brand-copy">
          <span class="brand-name d-block fw-semibold" data-i18n="brand.name">NStudio Salon</span>
          <small class="brand-tagline text-muted" data-i18n="brand.tagline">Beauty platform scaffold</small>
        </span>
      </a>

      <nav class="main-nav d-flex flex-wrap align-items-center gap-2" aria-label="Main navigation">
        <a href="/home" data-nav-link data-route="/home" class="nav-pill btn btn-sm btn-outline-light" data-i18n="nav.home">Home</a>
        <a href="/booking" data-nav-link data-route="/booking" class="nav-pill btn btn-sm btn-success" data-i18n="nav.booking">Book Now</a>
        <a href="/products" data-nav-link data-route="/products" class="nav-pill btn btn-sm btn-outline-light" data-i18n="nav.products">Products</a>
        <a href="/services" data-nav-link data-route="/services" class="nav-pill btn btn-sm btn-outline-light" data-i18n="nav.services">Services</a>
        <a href="/contact" data-nav-link data-route="/contact" class="nav-pill btn btn-sm btn-outline-light" data-i18n="nav.contact">Contact Us</a>
      </nav>

      <div class="locale-switch btn-group" role="group" aria-label="Language switch">
        <button type="button" class="btn btn-sm btn-outline-light" data-locale="bg">BG</button>
        <button type="button" class="btn btn-sm btn-outline-light" data-locale="en">EN</button>
      </div>

      <div class="auth-slot d-flex align-items-center gap-2">{{AUTH_SLOT}}</div>
    </div>
  </div>
</header>
