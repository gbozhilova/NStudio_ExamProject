<div class="booking-page">

  <!-- Progress bar -->
  <div class="booking-progress mb-4">
    <div class="d-flex justify-content-between align-items-center gap-1">
      <div class="booking-step-dot" data-step="1"><span>1</span><small data-i18n="booking.step.category">Category</small></div>
      <div class="booking-step-line"></div>
      <div class="booking-step-dot" data-step="2"><span>2</span><small data-i18n="booking.step.service">Service</small></div>
      <div class="booking-step-line"></div>
      <div class="booking-step-dot" data-step="3"><span>3</span><small data-i18n="booking.step.staff">Staff</small></div>
      <div class="booking-step-line"></div>
      <div class="booking-step-dot" data-step="4"><span>4</span><small data-i18n="booking.step.time">Time</small></div>
      <div class="booking-step-line"></div>
      <div class="booking-step-dot" data-step="5"><span>5</span><small data-i18n="booking.step.confirm">Confirm</small></div>
    </div>
  </div>

  <!-- Selection summary bar -->
  <div id="booking-summary-bar" class="booking-summary-bar d-none mb-3"></div>

  <!-- Alert -->
  <div id="booking-alert" class="alert d-none" role="alert"></div>

  <!-- Step content -->
  <div id="booking-step" class="booking-step-content">
    <div class="text-center py-5">
      <div class="spinner-border text-primary" role="status"></div>
    </div>
  </div>

  <!-- Navigation -->
  <div id="booking-nav" class="d-flex justify-content-between mt-4 d-none">
    <button id="booking-back" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left me-1"></i>
      <span data-i18n="booking.nav.back">Back</span>
    </button>
    <button id="booking-next" class="btn btn-primary d-none">
      <span class="btn-label" data-i18n="booking.nav.next">Next</span>
      <i class="bi bi-arrow-right ms-1"></i>
      <span class="spinner-border spinner-border-sm d-none ms-2"></span>
    </button>
  </div>

</div>
