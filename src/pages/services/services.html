<section class="services-page">
  <section class="page-panel rounded-4 p-3 p-lg-4 mb-4 services-category-section">
    <div class="d-flex align-items-center justify-content-between gap-3 mb-3 flex-wrap">
      <div>
        <p class="services-kicker script-font mb-0" data-i18n="services.categories.label">Our Services</p>
        <div class="small text-light-muted text-uppercase letter-spaced mt-1" data-i18n="services.browseStrip">Review by Service Category</div>
      </div>
    </div>
    <div class="services-strip-shell">
      <button id="services-strip-prev" type="button" class="btn btn-sm btn-outline-secondary services-strip-nav" aria-label="Previous categories">
        <i class="bi bi-chevron-left"></i>
      </button>
      <div id="services-strip" class="services-strip" role="tablist" aria-label="Service categories"></div>
      <button id="services-strip-next" type="button" class="btn btn-sm btn-outline-secondary services-strip-nav" aria-label="Next categories">
        <i class="bi bi-chevron-right"></i>
      </button>
    </div>
  </section>

  <section class="page-panel rounded-4 p-4 p-lg-5">
    <div class="d-flex flex-wrap align-items-end justify-content-between gap-3 mb-4">
      <div>
        <div class="small text-light-muted text-uppercase letter-spaced mb-1" data-i18n="services.selectedCategoryLabel">Selected category</div>
        <h2 id="services-category-title" class="display-6 fw-bold mb-1" data-i18n="services.loading">Loading…</h2>
        <p id="services-category-copy" class="mb-0 text-light-muted" data-i18n="services.fetching">Fetching services from Supabase.</p>
      </div>
      <a href="/booking" data-nav-link class="btn btn-primary btn-lg px-4" data-i18n="nav.booking">Book Now</a>
    </div>

    <div id="services-loading" class="text-center py-5">
      <div class="spinner-border text-info" role="status" aria-hidden="true"></div>
    </div>

    <div id="services-list" class="row g-4 d-none"></div>
  </section>
</section>
