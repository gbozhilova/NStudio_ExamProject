<section class="products-page">
  <section class="page-panel rounded-4 p-3 p-lg-4 mb-4 products-category-section">
    <div class="d-flex align-items-center justify-content-between gap-3 mb-3 flex-wrap">
      <div>
        <p class="products-kicker script-font mb-0" data-i18n="products.categories.label">Our Products</p>
      </div>
    </div>
    <div class="products-strip-shell">
      <button id="products-strip-prev" type="button" class="btn btn-sm btn-outline-secondary products-strip-nav" aria-label="Previous categories">
        <i class="bi bi-chevron-left"></i>
      </button>
      <div id="products-strip" class="products-strip" role="tablist" aria-label="Product categories"></div>
      <button id="products-strip-next" type="button" class="btn btn-sm btn-outline-secondary products-strip-nav" aria-label="Next categories">
        <i class="bi bi-chevron-right"></i>
      </button>
    </div>
  </section>

  <section class="page-panel rounded-4 p-4 p-lg-5">
    <div id="products-loading" class="text-center py-5">
      <div class="spinner-border text-info" role="status" aria-hidden="true"></div>
    </div>

    <div id="products-list" class="row g-4 d-none"></div>
  </section>

  <section class="page-panel rounded-4 p-4 p-lg-5 mt-4 products-reviews-section">
    <div class="d-flex flex-wrap align-items-end justify-content-between gap-3 mb-4">
      <div class="d-none" aria-hidden="true">
        <div class="small text-light-muted text-uppercase letter-spaced mb-1" data-i18n="products.reviews.label">Product Reviews</div>
        <h2 id="products-review-title" class="display-6 fw-bold mb-1" data-i18n="products.reviews.title">Choose a product to read and write reviews</h2>
        <p id="products-review-copy" class="mb-0 text-light-muted" data-i18n="products.reviews.copy">Leave a star rating and upload photos that show how the product performs in real use.</p>
      </div>
      <div id="products-review-stars-summary" class="review-rating-inline" aria-label="Average rating"></div>
      <div class="products-review-summary text-lg-end">
        <div id="products-review-average" class="display-6 fw-bold mb-0">—</div>
        <div id="products-review-count" class="small text-light-muted" data-i18n="products.reviews.total">Reviews</div>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-12">
        <div id="product-reviews-list" class="d-grid gap-3">
        </div>
      </div>
    </div>
  </section>
</section>
